<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R.I.P — Taica</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230a0a0a'/><text x='16' y='24' text-anchor='middle' font-size='18' font-family='serif' fill='%23f1ece4'>✦</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;
  --fg:#f1ece4;
  --fg-dim:#7a766f;
  --fg-faint:#3a3733;
  --accent:#ff5b3a;
  --line:rgba(241,236,228,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--bg)}
html,body{
  color:var(--fg);
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  line-height:1.5;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  cursor:default;
}
a{color:inherit;text-decoration:none}

/* grain */
.grain{
  position:fixed;inset:-50%;pointer-events:none;z-index:8000;opacity:.06;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  mix-blend-mode:overlay;
  animation:noise .3s steps(4) infinite;
}
@keyframes noise{
  0%{transform:translate(0,0)}25%{transform:translate(-3%,2%)}
  50%{transform:translate(3%,-3%)}75%{transform:translate(-2%,3%)}
  100%{transform:translate(0,0)}
}

/* nav */
.nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:28px 56px 20px;
  border-bottom:1px solid var(--line);
  font-size:10px;letter-spacing:.28em;color:var(--fg-dim);
  text-transform:uppercase;
}
.nav .brand{color:var(--fg);font-weight:500}
.nav a{transition:color .15s}
.nav a:hover{color:var(--fg)}

/* hero */
.hero{
  padding:80px 56px 40px;
  border-bottom:1px solid var(--line);
}
.hero .kicker{
  font-size:10px;letter-spacing:.36em;text-transform:uppercase;
  color:var(--fg-dim);margin-bottom:20px;
  display:flex;align-items:center;gap:14px;
}
.hero .kicker::before{content:"";width:48px;height:1px;background:var(--fg-dim)}
.hero h1{
  font-family:'Instrument Serif',serif;
  font-size:clamp(72px,12vw,160px);
  line-height:.85;letter-spacing:-.04em;
  color:var(--fg);font-style:italic;
  margin-bottom:24px;
}
.hero .dates{
  font-size:11px;letter-spacing:.32em;text-transform:uppercase;
  color:var(--fg-dim);
}
.hero .dates span{color:var(--fg)}

/* photos */
.gallery{
  padding:56px 56px 0;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:2px;
}
.photo-wrap{
  position:relative;overflow:hidden;
  aspect-ratio:3/4;
  background:var(--fg-faint);
}
.photo-wrap img{
  width:100%;height:100%;
  object-fit:cover;
  filter:grayscale(1) contrast(1.05) brightness(.95);
  transition:filter .4s ease, transform .4s ease;
  display:block;
}
.photo-wrap:hover img{
  filter:grayscale(.6) contrast(1.05) brightness(1);
  transform:scale(1.02);
}
.photo-num{
  position:absolute;bottom:12px;left:14px;
  font-size:9px;letter-spacing:.28em;text-transform:uppercase;
  color:rgba(241,236,228,.5);
}

/* message */
.message{
  padding:56px 56px;
  max-width:720px;
  border-top:1px solid var(--line);
  margin-top:56px;
}
.message p{
  font-family:'Instrument Serif',serif;
  font-size:clamp(18px,2vw,26px);
  line-height:1.55;letter-spacing:-.01em;
  font-style:italic;
  color:var(--fg-dim);
}
.message p em{color:var(--fg)}

/* footer */
.foot{
  padding:28px 56px 40px;
  border-top:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  font-size:10px;letter-spacing:.25em;text-transform:uppercase;
  color:var(--fg-faint);
}
.foot .mark{
  font-family:'Instrument Serif',serif;
  font-size:22px;letter-spacing:0;
  color:var(--fg-dim);font-style:italic;
}

/* fade in */
.hero,.gallery,.message,.foot{
  opacity:0;transform:translateY(12px);
  animation:fadeUp .7s ease forwards;
}
.gallery{animation-delay:.1s}
.message{animation-delay:.2s}
.foot{animation-delay:.3s}
@keyframes fadeUp{to{opacity:1;transform:none}}

/* mobile */
@media(max-width:600px){
  .nav,.hero,.gallery,.message,.foot{padding-left:20px;padding-right:20px}
  .hero{padding-top:40px}
  .gallery{padding-top:32px;grid-template-columns:1fr 1fr}
  .message{padding-top:40px;margin-top:32px}
}
</style>
</head>
<body>
<div class="grain"></div>

<nav class="nav">
  <div class="brand">DARG ©</div>
  <a href="portfolio.html">← BACK</a>
</nav>

<section class="hero">
  <div class="kicker">IN LOVING MEMORY</div>
  <h1>Taica</h1>
  <div class="dates"><span>Forever missed</span></div>
</section>

<div class="gallery">
  <div class="photo-wrap">
    <img src="images/taica1.jpg" alt="Taica">
    <span class="photo-num">01</span>
  </div>
  <div class="photo-wrap">
    <img src="images/taica2.jpg" alt="Taica">
    <span class="photo-num">02</span>
  </div>
  <div class="photo-wrap">
    <img src="images/taica3.jpg" alt="Taica">
    <span class="photo-num">03</span>
  </div>
</div>

<div class="message">
  <p><em>Gone but never forgotten.</em> You were one of a kind — always there, always real. This page exists so you are never just a memory.</p>
</div>

<div class="foot">
  <span class="mark">✦</span>
  <span>R.I.P · DARG © · 20XX</span>
</div>

</body>
</html>
